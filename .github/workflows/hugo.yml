name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to the submodule
      pages: write # If also using the built-in Pages features
      id-token: write # If using OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # Checks out the submodule
          fetch-depth: 0 # Ensure full history for submodule push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build
        run: hugo --gc --minify

      - name: Deploy to public repo submodule
        run: |
          cd public
          git config user.name "GitHub Actions"
          git config user.email "<>"
          git add .
          git commit -m "Deploy from GitHub Actions" || echo "No changes to commit"
          git push origin main # Pushes to the main branch of the public repo submodule
